<!-- Track icon for Athletics Utilities -->
<svg
  class="lucide lucide-track"
  xmlns="http://www.w3.org/2000/svg"
  width="24"
  height="24"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <!-- Outer track oval -->
  <ellipse cx="12" cy="12" rx="10" ry="6" />
  <!-- Inner track oval (infield) -->
  <ellipse cx="12" cy="12" rx="6" ry="3" />
  <!-- Lane lines -->
  <ellipse cx="12" cy="12" rx="8" ry="4.5" />
</svg>
